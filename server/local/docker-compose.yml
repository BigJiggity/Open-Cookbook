services:
  web:
    image: php:8.3-apache
    ports:
      - "${OPEN_COOKBOOK_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: open_cookbook
      DB_USER: open_cookbook
      DB_PASSWORD: open_cookbook
      COOKBOOK_DOCUMENT_ID: default
    volumes:
      - ../../:/var/www/html:ro
      - ./api:/var/www/html/api:ro
      - ./apache.conf:/etc/apache2/sites-enabled/000-default.conf:ro
    command: >
      bash -lc "docker-php-ext-install pdo_mysql
      && apache2-foreground"
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: open_cookbook_root
      MARIADB_DATABASE: open_cookbook
      MARIADB_USER: open_cookbook
      MARIADB_PASSWORD: open_cookbook
    volumes:
      - open-cookbook-db:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  open-cookbook-db:
